services:
  - type: web
    name: investment-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: investment_tracker
      - key: CORS_ORIGINS
        sync: false
      - key: FLASK_DEBUG
        value: "False"
